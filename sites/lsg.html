<!DOCTYPE html>

<html lang="en">
	
	<head>
        
    	<meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!--======= FONTS =======-->
		<link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Cinzel:wght@400..900&family=Lora:ital,wght@0,400..700;1,400..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

<!--======= CSS =======-->
		<style>
/* ================= BODY ================= */

            html {
                min-height: 100%;
                scroll-behavior: smooth;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: #0A1F44;
                background-attachment: fixed;
            }

            h1, h2, h3, h4, h5, h6 {
                font-family: 'Cinzel', serif;
                text-align: center;
            }

            p, li {
                text-align: center;
                font-family: 'PT Serif', serif;
                font-weight: bold;
                font-size: 20px;
                font-style: normal;
                padding-inline: 20px;
                padding-block: 0;
            }

            ul {
            list-style: none;
            padding-left: 0; 
            margin-left: 0;
            }
			
            a {
                color: inherit;
            }

/* ================= IMAGES ================= */

            img {
                display: block;
                margin: 0 auto;
            }
                
            .img-desc {
                font-family: 'Lora', sans-serif;
                font-size: 20px;
                text-align: center;
                font-weight: bold;
                font-style: italic;
            }

            .img-pair {
                display: flex;
                justify-content: center;
                align-items: center; 
                gap: 24px;
                margin: 32px auto;
                max-width: 1200px;
            }

            .img-pair img {
                max-width: 48%;
                height: auto;
                display: block;
            }

            .h-img {
                display: flex;
                justify-content: center;
                align-items: center; 
                gap: 24px;
                margin: 32px auto;
                max-width: 1200px;
            }

            .h-img img {
            width: 75%;
            height: auto;
            object-fit: contain;
            }

            .v-img {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 32px auto;
            }

            .v-img img {
            height: 700px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            }

/* ================= HEADER ================= */

            .site-header {
                background-color: #F26C2A;
                margin: 20px;
                border-radius: 16px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 1);
                margin-bottom: 40px;
            }

            .header-inner {
                display: grid;
                grid-template-columns: auto 1fr auto;
                align-items: center;
                padding: 0 24px;
            }

            .header-text {
                text-align: center;
                justify-self: center;
                max-width: 700px;
            }

            .header-spacer {
                width: 48px;
            }

            .logo-link {
                display: inline-block;
                text-decoration: none;
                justify-self: start;
            }

            .logo-img {
                height: 150px;
                width: auto;
                display: block;
                margin-top: 10px;
                margin-bottom: 10px;
            }

            .logo-link:hover,
            .logo-link:focus,
            .logo-link:active {
                text-decoration: none;
                outline: none;
            }

            .header-text h1 {
                margin: 0;
                font-family: 'Cinzel', serif;
                color: #ffffff;
                font-size: 40px;	
            }

            .header-text p {
                margin: 4px 0 0;
                font-family: 'Cinzel', serif;
                color: #ffffff;
                font-size: 32px;
            }

            /* ================= TABLE ================= */

            .main-table {
                width: 90%;
                border-collapse: collapse;
                margin: auto;
                border-radius: 30px;
                overflow: hidden;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 1);
                background-color: #e5e5e5;
                margin-top: 40px;
                margin-bottom: 50px;
            }
                
            .main-table th, .main-table td {
                border: none;
                border-bottom: 3px solid #3d3d3d;
                padding: 10px;
                text-align: center;
                font-family: 'Bitter';
            }

            .main-table th {
                border-bottom: 5px solid #676767;
                background-color: #1E90FF;
                color: #ffffff;
                font-size: 18px;
            }

            .main-table td {
                color: #ffffff;
            }

            .main-table tbody tr {
                opacity: 0;
                transform: translateY(20px);
                cursor: pointer;
                transition:
                    transform 0.25s ease,
                    box-shadow 0.25s ease,
                    background-color 0.25s ease;
                position: relative;
                z-index: 0;
            }

            .main-table tbody tr:hover {
                transform: scale(1.5);
                box-shadow: 0 12px 35px rgba(0, 0, 0, 1);
                z-index: 10;
            }

            .main-table tbody tr.animate {
                animation: slideInUp 0.6s ease forwards;
            }

            @keyframes slideInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
}

            /* ================= FOOTER ================= */

            .site-footer {
                background-color: #F26C2A;
                margin: 20px;
                border-radius: 16px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.75);
                margin-top: 40px;
            }

            .footer-text {
                text-align: center;
                justify-self: center;
            }

            .footer-spacer {
                width: 48px;
            }

            .footer-text h1 {
                margin: 0;
                font-family: 'Cinzel', serif;
                color: #ffffff;
                font-size: 40px;	
            }

            .footer-text p {
                margin: 4px 0 0;
                font-family: 'Cinzel', serif;
                color: #ffffff;
                font-size: 20px;
                max-width: 1400px;
                margin-bottom: 40px;
                font-weight: bold;
            }

            /* ================= ANIMATION ================= */

            @media (prefers-reduced-motion: reduce) {
                .main-table tbody tr {
                    opacity: 1;
                    transform: none;
                    animation: none;
                }
            }
        </style>

<!--======= TITLE =======-->
    	<title>
		  The IPL Pavilion - Lucknow Super Giants
		</title>
	</head>
	
<!--======= BODY =======-->
	<body>

<!--======= HEADER =======-->
	<header class="site-header">

		<div class="header-inner">

        <a href="https://www.iplt20.com/" class="logo-link">
            <img src="../images/ipl-logo.png" class="logo-img" alt="ipl logo img">
        </a>

          <div class="header-text">

            <h1>
                <a href="../main.html">
                    The IPL Pavilion
                </a>
            </h1>

            <p>
                The Lucknow Super Giants
            </p>

          </div>

        <a href="https://www.lucknowsupergiants.in/" class="logo-link">
            <img src="../images/lsg-logo.png" class="logo-img" alt="lsg logo img">
        </a>
          
        <div class="header-spacer"></div>

    	</div>
	</header>

<!--======= INTRODUCTION =======-->

<!--======= FOOTER =======-->
	<footer class="site-footer">
    <div class="footer-text">
        <p>placeholder for future content</p>
    </div>
	</footer>
		
    <script src="script.js"> </script>
		
	</body>
</html>
